name: Pro-Grade-Ubuntu-Remaster
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 1. تفريغ مساحة السيرفر القصوى (إجباري لتجنب اختناق الهارد)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          sudo apt-get clean

      - name: 2. تثبيت أدوات البناء الاحترافية
        run: |
          sudo apt-get update
          # إضافة aria2 كبديل احترافي لـ wget لمنع انقطاع التحميل
          sudo apt-get install -y xorriso squashfs-tools aria2 rsync mtools dpkg-dev

      - name: 3. التحميل الفولاذي للأيزو (منع Exit Code 8)
        run: |
          URL="https://releases.ubuntu.com/24.04/ubuntu-24.04-desktop-amd64.iso"
          # سحب الملف بـ 16 اتصال متزامن لضمان عدم توقف السيرفر
          aria2c -x 16 -s 16 --retry-wait=5 --max-tries=10 --dir=. --out=base.iso "$URL"
          
          # فحص الحجم الميت: لو الملف أقل من 2.5 جيجا، السكربت هيقف فوراً
          [[ $(stat -c%s base.iso) -lt 2500000000 ]] && exit 1

      - name: 4. تشريح هيكل الأيزو
        run: |
          mkdir -p extract-cd
          sudo xorriso -osirrox on -indev base.iso -extract / extract-cd/
          sudo chmod -R 777 extract-cd/

      - name: 5. القنص الديناميكي لملف النظام (حل مشكلة لم أجد الملف)
        run: |
          SQ_PATH=$(find extract-cd -name "*.squashfs" | head -n 1)
          echo "SQUASH_VAR=$SQ_PATH" >> $GITHUB_ENV
          sudo unsquashfs -d edit "$SQ_PATH"

      - name: 6. هندسة العزل الآمن (حل مشكلة Exit Code 1 / Same File)
        run: |
          sudo mount --bind /dev edit/dev
          sudo mount --bind /proc edit/proc
          sudo mount --bind /sys edit/sys
          sudo mount --bind /run edit/run
          
          # الطريقة الاحترافية: فك الرابط الوهمي بدلاً من المسح العشوائي
          sudo unlink edit/etc/resolv.conf || sudo rm -f edit/etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee edit/etc/resolv.conf

      - name: 7. حقن التعديلات الأساسية
        run: |
          sudo chroot edit /bin/bash << 'EOF'
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          
          # تثبيت البرامج المطلوبة فقط لضمان استقرار العتاد
          apt-get install -y wine synaptic mesa-utils
          
          # إنشاء المجلد في الهيكل الأساسي لحمايته من أي تعديل مستقبلي
          mkdir -p /etc/skel/Downloads
          echo "SYSTEM PROTECTED FOLDER" > /etc/skel/Downloads/.lock
          chown root:root /etc/skel/Downloads/.lock
          # تحويل المجلد للقراءة فقط بشكل جذري
          chmod 555 /etc/skel/Downloads
          
          apt-get clean
          EOF

      - name: 8. إعادة بناء روابط النظام الآمنة والتفكيك
        run: |
          # استعادة رابط الإنترنت الأصلي عشان النسخة متفصلش نت بعد ما تسطبها
          sudo rm -f edit/etc/resolv.conf
          sudo ln -s ../run/systemd/resolve/stub-resolv.conf edit/etc/resolv.conf
          
          sudo umount -l edit/run || true
          sudo umount -l edit/dev || true
          sudo umount -l edit/proc || true
          sudo umount -l edit/sys || true

      - name: 9. الضغط الصارم (مضاد لانهيار السيرفر)
        run: |
          sudo rm -f "${{ env.SQUASH_VAR }}"
          # استخدام noappend لمنع أي تداخل مع بقايا الملف القديم
          sudo mksquashfs edit "${{ env.SQUASH_VAR }}" -comp zstd -b 1M -mem 4G -noappend

      - name: 10. صياغة الأيزو النهائي (دعم الإقلاع الشامل)
        run: |
          mkdir -p output
          sudo xorriso -as mkisofs -r -V "XUBUNTU_PRO" \
            -o output/HP-Custom-System.iso \
            -J -l -b boot/grub/i386-pc/eltorito.img \
            -c boot.catalog -no-emul-boot -boot-load-size 4 \
            -boot-info-table extract-cd/

      - name: 11. الرفع الفوري
        uses: actions/upload-artifact@v4
        with:
          name: HP-Custom-ISO-PRO
          path: output/*.iso
          retention-days: 3
