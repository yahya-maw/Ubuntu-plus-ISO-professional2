name: HP-G62-Ubuntu-Server-To-Gnome
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 1. 📂 سحب ملفات المشروع (Scripts Folder)
        uses: actions/checkout@v4

      - name: 2. 🧹 تنظيف المساحة (توفير 70 جيجا)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af

      - name: 3. ⚙️ تثبيت ترسانة الأدوات
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso squashfs-tools aria2 rsync curl

      - name: 4. 🎯 صيد نسخة السيرفر (حل 404 نهائياً)
        run: |
          # الدخول للسيرفر وجلب الرابط الصحيح ديناميكياً لتجنب أخطاء التحميل
          BASE_URL="https://releases.ubuntu.com/24.04/"
          ISO_FILE=$(curl -s $BASE_URL | grep -oP 'ubuntu-[0-9.]*-live-server-amd64.iso' | head -1)
          aria2c -x 16 -s 16 -o server.iso "${BASE_URL}${ISO_FILE}"

      - name: 5. 📂 تشريح النظام
        run: |
          mkdir -p extract-cd edit
          sudo xorriso -osirrox on -indev server.iso -extract / extract-cd/
          rm server.iso
          SQ_FILE=$(find extract-cd -name "*.squashfs" | head -n 1)
          sudo unsquashfs -d edit "$SQ_FILE"

      - name: 6. 🚀 إدماج السكربتات وحل الشبكة (Same File Fix)
        run: |
          # حل مشكلة resolv.conf المتعارضة في نسخة 24.04
          sudo mount --bind /dev edit/dev
          sudo mount --bind /proc edit/proc
          sudo mount --bind /sys edit/sys
          sudo rm -f edit/etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee edit/etc/resolv.conf
          
          # نقل مجلد السكربتات الخاص بك لداخل النظام
          sudo mkdir -p edit/opt/custom-scripts
          if [ -d "scripts" ]; then
            sudo cp -r scripts/* edit/opt/custom-scripts/
            sudo chmod +x edit/opt/custom-scripts/*
          fi

      - name: 7. 💉 الحقن الجذري (Gnome Style + Intel Drivers)
        run: |
          sudo chroot edit /bin/bash << 'EOF'
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          
          # تثبيت الواجهة وثيمات Yaru (شكل أوبونتو)
          apt-get install -y xfce4 xfce4-goodies xorg lightdm yaru-theme-gtk yaru-theme-icon
          
          # تثبيت تعريفات Intel لجهاز HP G62 [cite: 2026-03-22]
          apt-get install -y intel-microcode xserver-xorg-video-intel mesa-utils wine synaptic
          
          # هندسة واجهة GNOME (Panel علوي و Dock يساري)
          mkdir -p /etc/skel/.config/xfce4/xfconf/xfce-perchannel-xml/
          cat <<'XF' > /etc/skel/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-panel.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfce4-panel" version="1.0">
            <property name="panels" type="array">
              <value type="int" value="1"/> <value type="int" value="2"/> </property>
            <property name="panel-1" type="empty">
              <property name="position" type="string" value="p=6;x=0;y=0"/>
              <property name="size" type="uint" value="30"/>
            </property>
            <property name="panel-2" type="empty">
              <property name="position" type="string" value="p=8;x=0;y=0"/>
              <property name="size" type="uint" value="56"/>
            </property>
          </channel>
          XF

          # تطبيق ثيم Yaru-dark الأنيق
          cat <<'XF' > /etc/skel/.config/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xsettings" version="1.0">
            <property name="Net" type="empty">
              <property name="ThemeName" type="string" value="Yaru-dark"/>
              <property name="IconThemeName" type="string" value="Yaru"/>
            </property>
          </channel>
          XF

          # حماية مجلد التنزيلات (Downloads) [cite: 2026-03-21]
          mkdir -p /etc/skel/Downloads && chmod 555 /etc/skel/Downloads
          
          apt-get clean
          exit
          EOF

      - name: 8. 📦 إعادة الإغلاق (Zstd Compression)
        run: |
          sudo rm -f edit/etc/resolv.conf
          sudo ln -s ../run/systemd/resolve/stub-resolv.conf edit/etc/resolv.conf
          sudo umount -l edit/dev edit/proc edit/sys || true
          sudo rm -f extract-cd/casper/filesystem.squashfs
          sudo mksquashfs edit extract-cd/casper/filesystem.squashfs -comp zstd -b 1M -mem 4G

      - name: 9. 💿 إنتاج الأيزو (مبني على سيرفر)
        run: |
          mkdir -p output
          sudo xorriso -as mkisofs -r -V "HP_G62_PRO_SERVER" \
            -o output/HP-G62-Final-System.iso \
            -J -l -b boot/grub/i386-pc/eltorito.img \
            -c boot.catalog -no-emul-boot -boot-load-size 4 \
            -boot-info-table extract-cd/

      - name: 10. 📤 الرفع
        uses: actions/upload-artifact@v4
        with:
          name: HP-G62-Final-ISO
          path: output/*.iso
