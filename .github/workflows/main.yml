name: Xubuntu-Pro-Master-Build
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 1. 🧹 تنظيف السيرفر (تحرير 60 جيجا)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker system prune -af

      - name: 2. ⚙️ تثبيت أدوات المطورين
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso squashfs-tools aria2 rsync mtools sed

      - name: 3. 📥 التحميل الصاروخي (الرابط الصحيح لـ Xubuntu)
        run: |
          # الرابط ده هو المكان الرسمي الوحيد لـ Xubuntu 24.04 LTS
          URL="https://cdimage.ubuntu.com/xubuntu/releases/24.04/release/xubuntu-24.04-desktop-amd64.iso"
          aria2c -x 16 -s 16 --retry-wait=2 --max-tries=20 -o base.iso "$URL"
          [[ ! -f base.iso ]] && exit 1

      - name: 4. 📂 تشريح الأيزو واستخراج ملف النظام
        run: |
          mkdir -p extract-cd
          sudo xorriso -osirrox on -indev base.iso -extract / extract-cd/
          # حل مشكلة الصورة 1: البحث في المسار الصحيح لـ 24.04
          SQ_FILE=$(find extract-cd/casper -name "filesystem.squashfs" -o -name "*.squashfs" | head -n 1)
          echo "SQUASH_PATH=$SQ_FILE" >> $GITHUB_ENV
          sudo unsquashfs -d edit "$SQ_FILE"

      - name: 5. 💉 الحقن الاحترافي (حل مشكلة الصورة 2 والنت)
        run: |
          sudo mount --bind /dev edit/dev
          sudo mount --bind /proc edit/proc
          sudo mount --bind /sys edit/sys
          
          # حل مشكلة "Same File" (الصورة 2) بأمر المحترفين
          sudo rm -f edit/etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee edit/etc/resolv.conf

          sudo chroot edit /bin/bash << 'EOF'
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          
          # تثبيت البرامج المطلوبة
          apt-get install -y wine synaptic mesa-utils
          
          # تنفيذ طلبك: حماية مجلد التنزيلات (Downloads) [cite: 2026-03-21]
          mkdir -p /etc/skel/Downloads
          echo "هذا المجلد محمي من الحذف والعبث" > /etc/skel/Downloads/PROTECTED.txt
          # جعل المجلد للقراءة فقط جذرياً
          chmod 555 /etc/skel/Downloads
          
          apt-get clean
          exit
          EOF

      - name: 6. 📦 إعادة الضغط (Zstd High Compression)
        run: |
          sudo umount -l edit/dev edit/proc edit/sys || true
          # استعادة حالة resolv.conf الأصلية لضمان عمل النت بعد التثبيت
          sudo rm -f edit/etc/resolv.conf
          sudo ln -s ../run/systemd/resolve/stub-resolv.conf edit/etc/resolv.conf
          
          sudo rm -f "${{ env.SQUASH_PATH }}"
          sudo mksquashfs edit "${{ env.SQUASH_PATH }}" -comp zstd -Xcompression-level 15 -b 1M -mem 4G

      - name: 7. 💿 إنتاج الأيزو النهائي (دعم BIOS و UEFI)
        run: |
          mkdir -p output
          # استخدام الإعدادات الأصلية للـ Boot لضمان الإقلاع على HP G62 [cite: 2026-03-22]
          sudo xorriso -as mkisofs -r -V "XUBUNTU_HP_G62" \
            -o output/HP-G62-Xubuntu-Pro.iso \
            -J -l -b boot/grub/i386-pc/eltorito.img \
            -c boot.catalog -no-emul-boot -boot-load-size 4 \
            -boot-info-table extract-cd/

      - name: 8. 📤 الرفع للتحميل المباشر
        uses: actions/upload-artifact@v4
        with:
          name: HP-G62-Xubuntu-Final
          path: output/*.iso
