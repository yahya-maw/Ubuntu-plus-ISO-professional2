name: Ultimate-HP-G62-Xubuntu-Remaster
on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. 🧹 تنظيف السيرفر بعمق (تحرير 45 جيجابايت لتجنب اختناق المساحة)
        run: |
          echo "إزالة البرامج غير الضرورية لمنع انهيار مساحة التخزين..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -a -f --volumes
          sudo apt-get clean
          sudo apt-get autoremove -y
          df -h /

      - name: 2. ⚙️ تثبيت ترسانة الأدوات المطلوبة
        run: |
          sudo apt-get update
          # تثبيت كل أدوات الضغط، الفك، الإقلاع، وهندسة الأقراص
          sudo apt-get install -y xorriso squashfs-tools wget curl rsync rename mtools grub-common grub-pc-bin grub-efi-amd64-bin
          which xorriso || (echo "❌ فشل تثبيت xorriso" && exit 1)
          which mksquashfs || (echo "❌ فشل تثبيت squashfs-tools" && exit 1)

      - name: 3. 📥 سحب ملف الـ ISO بدقة (مضاد للـ 404 والملفات الوهمية)
        run: |
          BASE_URL="https://cdimage.ubuntu.com/xubuntu/releases/24.04/release/"
          ISO_FILENAME=$(curl -sL "$BASE_URL" | grep -oP 'href="\Kxubuntu-24\.04(\.[0-9]+)?-desktop-amd64\.iso' | head -n 1)
          
          if [ -z "$ISO_FILENAME" ]; then echo "❌ فشل العثور على الإصدار" && exit 1; fi
          
          FULL_URL="${BASE_URL}${ISO_FILENAME}"
          echo "جاري تحميل: $FULL_URL"
          wget --quiet --show-progress -O base.iso "$FULL_URL"
          
          FILE_SIZE=$(stat -c%s base.iso)
          if [ "$FILE_SIZE" -lt 2500000000 ]; then echo "❌ حجم الملف صغير جداً! الرابط معطوب." && exit 1; fi

      - name: 4. 📂 فك ضغط نظام الملفات الأساسي بصلاحيات كاملة
        run: |
          mkdir -p extract-cd
          sudo xorriso -osirrox on -indev base.iso -extract / extract-cd/
          sudo chmod -R 777 extract-cd/

      - name: 5. 🔍 الفحص الراداري وتفكيك قلب النظام (SquashFS)
        run: |
          # البحث العميق عن الملف أياً كان مساره
          SQUASH_FILE=$(find extract-cd/ -type f -name "*.squashfs" | head -n 1)
          
          if [ -z "$SQUASH_FILE" ]; then
            echo "❌ لم يتم العثور على ملف النظام. محتويات المجلد:"
            ls -Rl extract-cd/
            exit 1
          fi
          
          echo "✅ تم إيجاد الملف في: $SQUASH_FILE"
          echo "SQUASH_PATH=$SQUASH_FILE" >> $GITHUB_ENV
          sudo unsquashfs -d edit "$SQUASH_FILE"

      - name: 6. 💉 الحقن الجذري (تخصيص العتاد والبرامج)
        run: |
          sudo mount --bind /dev edit/dev
          sudo mount --bind /run edit/run
          sudo mount -t proc /proc edit/proc
          sudo mount -t sysfs /sys edit/sys
          sudo cp /etc/resolv.conf edit/etc/

          cat << 'EOF' | sudo chroot edit /bin/bash
          export DEBIAN_FRONTEND=noninteractive
          set -e
          
          apt-get update
          apt-get install -y software-properties-common curl wget gnupg pciutils
          
          # جلب مفاتيح ومستودعات Waydroid و Wine و MX
          curl -s https://repo.waydro.id | bash
          add-apt-repository ppa:mx-linux/mx-tools -y
          dpkg --add-architecture i386
          mkdir -pm755 /etc/apt/keyrings
          wget -qO - https://dl.winehq.org/wine-builds/winehq.key | gpg --dearmor | tee /etc/apt/keyrings/winehq-archive.key > /dev/null
          echo "deb [signed-by=/etc/apt/keyrings/winehq-archive.key] https://dl.winehq.org/wine-builds/ubuntu/ noble main" | tee /etc/apt/sources.list.d/winehq.list
          
          apt-get update
          # تثبيت حزمة العتاد المركزية لضمان عمل الواجهة الرسومية بأعلى كفاءة، والبرامج المساندة
          apt-get install -y waydroid winehq-staging mx-apps mx-tools synaptic zram-config htop xserver-xorg-video-intel mesa-utils libegl1-mesa
          
          # تأمين وتجميد مسار التنزيلات بشكل دائم
          mkdir -p /etc/skel/Downloads
          touch /etc/skel/Downloads/.keep_permanent
          chmod a-w /etc/skel/Downloads
          
          # زراعة مثبت التطبيقات الشامل (APK/EXE)
          mkdir -p /usr/share/applications/
          cat << 'DESKTOP' > /usr/share/applications/universal-installer.desktop
          [Desktop Entry]
          Type=Application
          Name=Universal App Installer
          Exec=bash -c "if [[ %f == *.apk ]]; then waydroid app install %f; else wine %f; fi"
          MimeType=application/vnd.android.package-archive;application/x-ms-dos-executable;
          NoDisplay=true
          DESKTOP
          
          echo "application/vnd.android.package-archive=universal-installer.desktop" >> /usr/share/applications/mimeinfo.cache
          echo "application/x-ms-dos-executable=universal-installer.desktop" >> /usr/share/applications/mimeinfo.cache
          
          # تفعيل ZRAM لتسريع النظام
          echo "ALGO=lz4" >> /etc/default/zramswap
          echo "PERCENT=60" >> /etc/default/zramswap
          
          apt-get autoremove -y
          apt-get clean
          rm -rf /tmp/* /var/tmp/* /var/lib/apt/lists/*
          exit
          EOF

      - name: 7. 🔌 فك الارتباط الجبري (لتفادي تعليق السيرفر)
        run: |
          sudo umount -lf edit/dev || true
          sudo umount -lf edit/run || true
          sudo umount -lf edit/proc || true
          sudo umount -lf edit/sys || true
          sudo rm -f edit/etc/resolv.conf
          sync

      - name: 8. 📦 التغليف الديناميكي للنظام الجديد
        run: |
          sudo rm -f "${{ env.SQUASH_PATH }}"
          # ضغط قوي يحترم مساحة الرامات لتجنب (Out of Memory Kill)
          sudo mksquashfs edit "${{ env.SQUASH_PATH }}" -comp zstd -b 1M -noappend -Xdict-size 1M -mem 4G
          sudo rm -rf edit/
          sync

      - name: 9. 💿 هندسة وبناء ملف الـ ISO النهائي للإقلاع
        run: |
          cd extract-cd/
          sudo rm -f md5sum.txt
          sudo find -type f -print0 | sudo xargs -0 md5sum | grep -v isolinux/boot.cat | sudo tee md5sum.txt
          cd ..
          mkdir -p output
          
          # استخدام طريقتين للبناء؛ إذا فشلت الأولى في التعرف على الملفات تنتقل للثانية المضمونة فوراً
          sudo grub-mkrescue -o output/HP-G62-Ultimate-Edition.iso extract-cd/ || \
          sudo xorriso -as mkisofs -r -V "HP_G62_OS" \
            -o output/HP-G62-Ultimate-Edition.iso \
            -J -l -b boot/grub/i386-pc/eltorito.img \
            -c boot.catalog \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            extract-cd/

      - name: 10. 📤 التصدير (حفظ حصري لمدة 90 يوماً)
        uses: actions/upload-artifact@v4
        with:
          name: Ubuntu-HP-G62-Ultimate-Edition
          path: output/*.iso
          retention-days: 90
