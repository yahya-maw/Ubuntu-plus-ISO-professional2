name: HP-G62-Final-Dynamic-Build
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 1. 📂 سحب الكود (بما فيه مجلد السكربتات)
        uses: actions/checkout@v4

      - name: 2. 🧹 تنظيف السيرفر (توفير 70 جيجا)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af

      - name: 3. ⚙️ تثبيت ترسانة الأدوات
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso squashfs-tools aria2 rsync curl

      - name: 4. 🎯 صيد الرابط الصحيح (حل نهائي للـ 404)
        run: |
          # الدخول للسيرفر وجلب اسم أحدث ملف ISO متاح حالياً
          BASE_URL="https://releases.ubuntu.com/24.04/"
          ISO_FILE=$(curl -s $BASE_URL | grep -oP 'ubuntu-[0-9.]*-live-server-amd64.iso' | head -1)
          FULL_URL="${BASE_URL}${ISO_FILE}"
          echo "تم العثور على: $ISO_FILE"
          aria2c -x 16 -s 16 --retry-wait=2 --max-tries=15 -o server.iso "$FULL_URL"

      - name: 5. 📂 تفكيك الأيزو
        run: |
          mkdir -p extract-cd edit
          sudo xorriso -osirrox on -indev server.iso -extract / extract-cd/
          rm server.iso
          SQ_FILE=$(find extract-cd -name "*.squashfs" | head -n 1)
          sudo unsquashfs -d edit "$SQ_FILE"

      - name: 6. 🚀 إدماج "مجلد السكربتات" وحل الشبكة
        run: |
          # نقل السكربتات الخاصة بك من المستودع إلى داخل الأيزو
          sudo mkdir -p edit/opt/my-scripts
          if [ -d "scripts" ]; then
            sudo cp -r scripts/* edit/opt/my-scripts/
            sudo chmod +x edit/opt/my-scripts/*
          fi
          
          # حل مشكلة Same File والشبكة
          sudo mount --bind /dev edit/dev
          sudo mount --bind /proc edit/proc
          sudo mount --bind /sys edit/sys
          sudo rm -f edit/etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee edit/etc/resolv.conf

      - name: 7. 💉 التخصيص (Intel Drivers + XFCE + Protection)
        run: |
          sudo chroot edit /bin/bash << 'EOF'
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          
          # تثبيت تعريفات Intel لجهاز HP G62 [cite: 2026-03-22]
          apt-get install -y intel-microcode xserver-xorg-video-intel mesa-utils
          
          # تثبيت الواجهة الخفيفة
          apt-get install -y xfce4 xfce4-goodies xorg lightdm wine synaptic
          
          # تنفيذ طلب حماية التنزيلات [cite: 2026-03-21]
          mkdir -p /etc/skel/Downloads
          chmod 555 /etc/skel/Downloads
          
          apt-get clean
          exit
          EOF

      - name: 8. 📦 إعادة الضغط النهائي
        run: |
          sudo rm -f edit/etc/resolv.conf
          sudo ln -s ../run/systemd/resolve/stub-resolv.conf edit/etc/resolv.conf
          sudo umount -l edit/dev edit/proc edit/sys || true
          
          sudo rm -f extract-cd/casper/filesystem.squashfs
          sudo mksquashfs edit extract-cd/casper/filesystem.squashfs -comp zstd -b 1M -mem 4G

      - name: 9. 💿 إنتاج الأيزو المصفح
        run: |
          mkdir -p output
          sudo xorriso -as mkisofs -r -V "HP_G62_PRO_BUILD" \
            -o output/HP-G62-Clean-Custom.iso \
            -J -l -b boot/grub/i386-pc/eltorito.img \
            -c boot.catalog -no-emul-boot -boot-load-size 4 \
            -boot-info-table extract-cd/

      - name: 10. 📤 الرفع للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: HP-G62-Professional-ISO
          path: output/*.iso
