name: HP-G62-Final-Safe-Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. 🧹 تفريغ مساحة السيرفر (أقصى تنظيف)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker system prune -a -f
          sudo apt-get clean

      - name: 2. ⚙️ تجهيز بيئة العمل
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso squashfs-tools wget rsync mtools grub-pc-bin grub-efi-amd64-bin

      - name: 3. 📥 جلب النسخة الأصلية (Xubuntu 24.04)
        run: |
          URL="https://cdimage.ubuntu.com/xubuntu/releases/24.04/release/xubuntu-24.04-desktop-amd64.iso"
          wget --quiet --show-progress -O base.iso "$URL"
          # فحص الأمان: التأكد أن الملف ليس "صفحة ويب" معطلة
          [[ $(stat -c%s base.iso) -lt 2000000000 ]] && exit 1

      - name: 4. 📂 تشريح الـ ISO (طريقة المسح الشامل)
        run: |
          mkdir -p extract-cd
          sudo xorriso -osirrox on -indev base.iso -extract / extract-cd/
          sudo chmod -R 777 extract-cd/

      - name: 5. 🔍 العثور على قلب النظام (حل مشكلة الصور 1-3)
        run: |
          # البحث الديناميكي لضمان عدم حدوث "No such file"
          SQUASH_PATH=$(find extract-cd/ -name "*.squashfs" | head -n 1)
          echo "SQUASH_PATH=$SQUASH_PATH" >> $GITHUB_ENV
          sudo unsquashfs -d edit "$SQUASH_PATH"

      - name: 6. 💉 التعديل الجذري (حل مشكلة الصورة 7)
        run: |
          # منع تعارض ملفات الشبكة الذي ظهر في الصورة الأخيرة
          sudo mount --bind /dev edit/dev
          sudo mount --bind /proc edit/proc
          sudo mount --bind /sys edit/sys
          
          # الخطوة السحرية: مسح أي روابط وهمية قبل الدخول
          sudo rm -f edit/etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee edit/etc/resolv.conf

          cat << 'EOF' | sudo chroot edit /bin/bash
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          
          # تثبيت عتاد Intel G62 لضمان استقرار الشاشة
          apt-get install -y xserver-xorg-video-intel mesa-utils
          
          # تنفيذ طلبك: تأمين مجلد التنزيلات ضد الحذف
          mkdir -p /home/vbox/Downloads
          echo "This folder is protected" > /home/vbox/Downloads/README.txt
          # جعل المجلد للقراءة فقط للمستخدم العادي
          chmod 555 /home/vbox/Downloads
          
          apt-get clean
          exit
          EOF

      - name: 7. 🔌 التفكيك الآمن (Unmount)
        run: |
          sudo umount -l edit/dev || true
          sudo umount -l edit/proc || true
          sudo umount -l edit/sys || true

      - name: 8. 📦 إعادة البناء (حماية الرامات)
        run: |
          # مسح النسخة القديمة لتوفير مساحة
          sudo rm -f "${{ env.SQUASH_PATH }}"
          # تحديد استهلاك الذاكرة لمنع انتحار السيرفر (OOM Kill)
          sudo mksquashfs edit "${{ env.SQUASH_PATH }}" -comp zstd -b 1M -mem 3G

      - name: 9. 💿 تصدير الأيزو النهائي
        run: |
          mkdir -p output
          sudo xorriso -as mkisofs -r -V "HP_G62_PRO" \
            -o output/HP-G62-System.iso \
            -J -l -b boot/grub/i386-pc/eltorito.img \
            -c boot.catalog -no-emul-boot -boot-load-size 4 \
            -boot-info-table extract-cd/

      - name: 10. 🚀 الرفع النهائي
        uses: actions/upload-artifact@v4
        with:
          name: HP-G62-Xubuntu-Build
          path: output/*.iso
