name: HP-G62-Professional-Script-Integration
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 1. 📂 سحب الكود (بما فيه مجلد السكربتات)
        uses: actions/checkout@v4

      - name: 2. 🧹 تنظيف السيرفر لتوفير مساحة
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker system prune -af

      - name: 3. ⚙️ تثبيت أدوات البناء
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso squashfs-tools aria2 rsync

      - name: 4. 📥 تحميل نسخة السيرفر (الأساس النظيف)
        run: |
          # الروابط الرسمية لنسخة 24.04 لتجنب خطأ 404
          URL="https://releases.ubuntu.com/24.04/ubuntu-24.04-live-server-amd64.iso"
          aria2c -x 16 -s 16 -o server.iso "$URL"

      - name: 5. 📂 تفكيك الأيزو ونظام الملفات
        run: |
          mkdir -p extract-cd edit
          sudo xorriso -osirrox on -indev server.iso -extract / extract-cd/
          SQ_FILE=$(find extract-cd -name "*.squashfs" | head -n 1)
          sudo unsquashfs -d edit "$SQ_FILE"

      - name: 6. 🚀 نقل "مجلد السكربتات" الخاص بك إلى قلب النظام
        run: |
          # نقل ملفاتك من مجلد scripts في جيت هاب إلى مجلد النظام داخل الأيزو
          sudo mkdir -p edit/usr/local/bin/my-scripts
          if [ -d "scripts" ]; then
            sudo cp -r scripts/* edit/usr/local/bin/my-scripts/
            sudo chmod +x edit/usr/local/bin/my-scripts/*
          fi

      - name: 7. 💉 حل مشكلة resolv.conf وحقن الإعدادات
        run: |
          sudo mount --bind /dev edit/dev
          sudo mount --bind /proc edit/proc
          sudo mount --bind /sys edit/sys
          
          # الحل النهائي لخطأ Same File الظاهر في صورك
          sudo rm -f edit/etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee edit/etc/resolv.conf

          sudo chroot edit /bin/bash << 'EOF'
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          
          # تثبيت الواجهة وتعريفات Intel لجهاز HP G62 [cite: 2026-03-22]
          apt-get install -y xfce4 xorg lightdm intel-microcode xserver-xorg-video-intel wine synaptic
          
          # حماية مجلد التنزيلات للأبد [cite: 2026-03-21]
          mkdir -p /etc/skel/Downloads
          chmod 555 /etc/skel/Downloads
          
          # تشغيل سكربت من ملفاتك (اختياري)
          # /usr/local/bin/my-scripts/setup.sh
          
          apt-get clean
          exit
          EOF

      - name: 8. 🔌 تنظيف الارتباط وإعادة الضغط
        run: |
          sudo rm -f edit/etc/resolv.conf
          sudo ln -s ../run/systemd/resolve/stub-resolv.conf edit/etc/resolv.conf
          sudo umount -l edit/dev edit/proc edit/sys || true
          
          sudo rm -f extract-cd/casper/filesystem.squashfs
          sudo mksquashfs edit extract-cd/casper/filesystem.squashfs -comp zstd -b 1M -mem 4G

      - name: 9. 💿 إنتاج الأيزو النهائي (HP-G62-Optimized)
        run: |
          mkdir -p output
          sudo xorriso -as mkisofs -r -V "HP_G62_PRO" \
            -o output/HP-G62-Final.iso \
            -J -l -b boot/grub/i386-pc/eltorito.img \
            -c boot.catalog -no-emul-boot -boot-load-size 4 \
            -boot-info-table extract-cd/

      - name: 10. 📤 الرفع
        uses: actions/upload-artifact@v4
        with:
          name: HP-G62-Final-ISO
          path: output/*.iso
