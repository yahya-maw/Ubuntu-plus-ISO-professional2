name: Ubuntu-HP-G62-Final-No-Errors
on: workflow_dispatch

jobs:
  ultimate-build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 2. 🧹 Deep Clean Disk (45GB Free)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker image prune -a -f
          sudo apt-get clean

      - name: 3. 🛠️ Install Missing Professional Tools
        run: |
          sudo apt-get update
          # تثبيت الأدوات مع التأكد من وجود 'rename' و 'xorriso'
          sudo apt-get install -y xorriso squashfs-tools wget curl rsync rename mesa-utils

      - name: 4. 💿 Dynamic ISO Fetcher (Anti-404)
        run: |
          # البحث عن الرابط الحقيقي والحي الآن لتجنب خطأ الـ 404 الذي ظهر في صورتك
          ISO_URL=$(curl -sL https://releases.ubuntu.com/24.04/ | grep -Eo 'https://releases\.ubuntu\.com/24\.04/ubuntu-24\.04[^"]*-desktop-amd64\.iso' | head -n 1)
          echo "Downloading: $ISO_URL"
          wget -q --show-progress -O base.iso "$ISO_URL"
          
          # صمام أمان: التأكد أن الملف ليس "صفحة خطأ" (يجب أن يكون أكبر من 3 جيجا)
          FILE_SIZE=$(stat -c%s base.iso)
          if [ $FILE_SIZE -lt 1000000 ]; then echo "❌ Fatal Error: Downloaded file is too small! Check link." && exit 1; fi

      - name: 5. 🔓 Advanced Extraction (Case-Insensitive)
        run: |
          mkdir -p x
          sudo xorriso -osirrox on -indev base.iso -extract / x/
          sudo chmod -R 777 x/
          # حل مشكلة casper/CASPER نهائياً بفتح كل الاحتمالات
          SQUASH_PATH=$(find x -iname "filesystem.squashfs" | head -n 1)
          if [ -z "$SQUASH_PATH" ]; then echo "❌ SquashFS file not found!" && exit 1; fi
          sudo unsquashfs -d edit "$SQUASH_PATH"

      - name: 6. 🧬 System Injection (HP G62 Optimized)
        run: |
          # تجهيز البيئة
          sudo mount --bind /dev edit/dev
          sudo mount --bind /run edit/run
          sudo mount -t proc /proc edit/proc
          sudo mount -t sysfs /sys edit/sys
          sudo cp /etc/resolv.conf edit/etc/

          # الحقن الداخلي للبرامج والتعريفات
          sudo chroot edit /bin/bash << 'EOF'
          set -e
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y software-properties-common curl wget gnupg

          # إضافة المستودعات (Waydroid, Wine, MX)
          curl -s https://repo.waydro.id | bash
          add-apt-repository ppa:mx-linux/mx-tools -y
          dpkg --add-architecture i386
          mkdir -pm755 /etc/apt/keyrings
          wget -qO - https://dl.winehq.org/wine-builds/winehq.key | gpg --dearmor | tee /etc/apt/keyrings/winehq-archive.key > /dev/null
          echo "deb [signed-by=/etc/apt/keyrings/winehq-archive.key] https://dl.winehq.org/wine-builds/ubuntu/ noble main" | tee /etc/apt/sources.list.d/winehq.list
          
          apt-get update
          # تثبيت تعريفات Intel الأصلية لـ G62 لضمان عدم وجود Error في الواجهة
          apt-get install -y xubuntu-desktop waydroid winehq-staging mx-apps mx-tools \
                             synaptic zram-config xserver-xorg-video-intel libegl1-mesa
          
          # تثبيت مشغل الـ APK و الـ EXE التلقائي
          echo "[Desktop Entry]\nName=Universal Installer\nExec=bash -c \"if [[ %f == *.apk ]]; then waydroid app install %f; else wine %f; fi\"\nType=Application\nMimeType=application/vnd.android.package-archive;application/x-ms-dos-executable;" > /usr/share/applications/handler.desktop

          # ضمان بقاء Downloads
          mkdir -p /etc/skel/Downloads
          touch /etc/skel/Downloads/.keep
          
          apt-get clean
          exit
          EOF

          # فك الارتباط الآمن
          sudo umount -l edit/dev
          sudo umount -l edit/run
          sudo umount -l edit/proc
          sudo umount -l edit/sys

      - name: 7. 📦 Repack & Finish
        run: |
          SQUASH_PATH=$(find x -iname "filesystem.squashfs" | head -n 1)
          sudo rm "$SQUASH_PATH"
          sudo mksquashfs edit "$SQUASH_PATH" -comp zstd -b 1M -noappend
          
          mkdir -p output
          sudo xorriso -as mkisofs -r -V "UBUNTU_G62" -o output/Ubuntu-HP-G62-Ultimate.iso x/

      - name: 8. 📤 Upload Final ISO
        uses: actions/upload-artifact@v4
        with:
          name: Ubuntu-HP-G62-Final
          path: output/*.iso
