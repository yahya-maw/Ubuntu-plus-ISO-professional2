name: HP-G62-Ultimate-Xubuntu-V3
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. 🧹 تنظيف جذري للمساحة (توفير 45 جيجا)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker system prune -a -f
          sudo apt-get clean

      - name: 2. ⚙️ تثبيت الأدوات السيادية
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso squashfs-tools wget curl rsync mtools grub-pc-bin grub-efi-amd64-bin

      - name: 3. 📥 تحميل الأيزو (فحص الحجم والروابط)
        run: |
          # اختيار رابط مباشر ومستقر لـ Xubuntu 24.04
          URL="https://cdimage.ubuntu.com/xubuntu/releases/24.04/release/xubuntu-24.04-desktop-amd64.iso"
          wget --quiet --show-progress -O base.iso "$URL"
          [[ $(stat -c%s base.iso) -lt 2000000000 ]] && (echo "❌ ملف الأيزو غير مكتمل" && exit 1)

      - name: 4. 📂 فك الهيكل الخارجي (ISO)
        run: |
          mkdir -p extract-cd
          sudo xorriso -osirrox on -indev base.iso -extract / extract-cd/
          sudo chmod -R 777 extract-cd/

      - name: 5. 🔍 البحث الراداري عن ملف النظام (SquashFS)
        run: |
          # حل مشكلة الصورة 1 و 2 و 3: البحث عن الملف مهما كان مكانه
          SQUASH_PATH=$(find extract-cd/ -name "*.squashfs" | head -n 1)
          if [ -z "$SQUASH_PATH" ]; then exit 1; fi
          echo "SQUASH_PATH=$SQUASH_PATH" >> $GITHUB_ENV
          sudo unsquashfs -d edit "$SQUASH_PATH"

      - name: 6. 💉 حقن التعديلات (حل مشكلة الصورة 7)
        run: |
          sudo mount --bind /dev edit/dev
          sudo mount --bind /proc edit/proc
          sudo mount --bind /sys edit/sys
          sudo mount --bind /run edit/run
          
          # حل مشكلة "same file" بالصورة 7: حذف الملف القديم قبل النسخ
          sudo rm -f edit/etc/resolv.conf
          sudo cp /etc/resolv.conf edit/etc/resolv.conf

          cat << 'EOF' | sudo chroot edit /bin/bash
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          
          # تثبيت تعريفات Intel G62 الأساسية ودعم التطبيقات
          apt-get install -y xserver-xorg-video-intel mesa-utils winehq-staging || true
          
          # تأمين مجلد التنزيلات (طلبك الخاص)
          mkdir -p /etc/skel/Downloads
          echo "No Delete" > /etc/skel/Downloads/IMPORTANT.txt
          chmod 555 /etc/skel/Downloads
          
          apt-get clean
          exit
          EOF

      - name: 7. 🔌 فك الارتباط الآمن
        run: |
          sudo umount -l edit/dev || true
          sudo umount -l edit/proc || true
          sudo umount -l edit/sys || true
          sudo umount -l edit/run || true

      - name: 8. 📦 إعادة الضغط (بإدارة ذكية للرامات)
        run: |
          sudo rm -f "${{ env.SQUASH_PATH }}"
          # استخدام 3 جيجا فقط من الرام لمنع انهيار السيرفر
          sudo mksquashfs edit "${{ env.SQUASH_PATH }}" -comp zstd -b 1M -mem 3G

      - name: 9. 💿 بناء الأيزو النهائي (دعم الإقلاع الشامل)
        run: |
          mkdir -p output
          sudo xorriso -as mkisofs -r -V "HP_G62_CUSTOM" \
            -o output/HP-G62-Xubuntu.iso \
            -J -l -b boot/grub/i386-pc/eltorito.img \
            -c boot.catalog -no-emul-boot -boot-load-size 4 \
            -boot-info-table extract-cd/

      - name: 10. 📤 رفع الملف (جاهز للتحميل)
        uses: actions/upload-artifact@v4
        with:
          name: HP-G62-Xubuntu-ISO
          path: output/*.iso
