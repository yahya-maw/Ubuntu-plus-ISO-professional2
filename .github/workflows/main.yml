name: HP-G62-Flawless-Build
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🧹 1. تفريغ أقصى مساحة (لتجنب اختناق السيرفر)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune -a -f
          sudo apt-get clean
          df -h

      - name: 🛠️ 2. تثبيت أدوات البناء
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso squashfs-tools wget curl rsync

      - name: 💿 3. سحب نسخة Xubuntu (خفيفة ومستقرة)
        run: |
          # سحب النسخة الخفيفة المدمجة بواجهة XFCE لتجنب انهيار مساحة GitHub
          BASE_URL="https://cdimage.ubuntu.com/xubuntu/releases/24.04/release/"
          ISO_NAME=$(curl -sL "$BASE_URL" | grep -oP 'href="\Kxubuntu-24\.04[0-9\.]*-desktop-amd64\.iso' | head -1)
          echo "Downloading: ${BASE_URL}${ISO_NAME}"
          wget -q --show-progress -O base.iso "${BASE_URL}${ISO_NAME}"
          
          # صمام أمان للتأكد أن الملف لم يأتِ فارغاً
          if [ $(stat -c%s base.iso) -lt 2000000000 ]; then echo "❌ حجم الملف غير صحيح!"; exit 1; fi

      - name: 🔓 4. فك الضغط الذكي (تجاهل حالة الأحرف)
        run: |
          mkdir -p extract-cd
          sudo xorriso -osirrox on -indev base.iso -extract / extract-cd/
          sudo chmod -R 777 extract-cd/
          
          # البحث الديناميكي لمنع خطأ No such file
          SQUASH_FILE=$(find extract-cd -type f -iname "filesystem.squashfs" | head -n 1)
          if [ -z "$SQUASH_FILE" ]; then echo "❌ لم أجد ملف النظام"; exit 1; fi
          
          sudo unsquashfs -d edit "$SQUASH_FILE"

      - name: 🧬 5. الحقن الداخلي (تعريفات G62 الدقيقة)
        run: |
          sudo mount --bind /dev edit/dev
          sudo mount --bind /run edit/run
          sudo mount -t proc /proc edit/proc
          sudo mount -t sysfs /sys edit/sys
          sudo cp /etc/resolv.conf edit/etc/

          cat << 'EOF' | sudo chroot edit /bin/bash
          set -e
          export DEBIAN_FRONTEND=noninteractive
          
          apt-get update
          apt-get install -y software-properties-common curl wget gnupg
          
          # إضافة المستودعات بأمان
          curl -s https://repo.waydro.id | bash
          add-apt-repository ppa:mx-linux/mx-tools -y
          dpkg --add-architecture i386
          mkdir -pm755 /etc/apt/keyrings
          wget -qO - https://dl.winehq.org/wine-builds/winehq.key | gpg --dearmor | tee /etc/apt/keyrings/winehq-archive.key > /dev/null
          echo "deb [signed-by=/etc/apt/keyrings/winehq-archive.key] https://dl.winehq.org/wine-builds/ubuntu/ noble main" | tee /etc/apt/sources.list.d/winehq.list
          
          apt-get update
          
          # تثبيت برامجك + تعريفات Intel الأصلية لضمان عمل الواجهة الرسومية بكفاءة
          apt-get install -y waydroid winehq-staging mx-apps mx-tools synaptic zram-config htop xserver-xorg-video-intel mesa-utils libegl1-mesa
          
          # إعداد مجلد التحميلات الدائم (لن يُحذف أبداً)
          mkdir -p /etc/skel/Downloads
          touch /etc/skel/Downloads/.keep_permanent
          
          # أداة تشغيل الـ APK والـ EXE مباشرة
          mkdir -p /usr/share/applications/
          echo -e "[Desktop Entry]\nType=Application\nName=App Installer\nExec=bash -c \"if [[ %f == *.apk ]]; then waydroid app install %f; else wine %f; fi\"\nMimeType=application/vnd.android.package-archive;application/x-ms-dos-executable;\nNoDisplay=true" > /usr/share/applications/installer.desktop
          echo "application/vnd.android.package-archive=installer.desktop" >> /usr/share/applications/mimeinfo.cache
          echo "application/x-ms-dos-executable=installer.desktop" >> /usr/share/applications/mimeinfo.cache
          
          # إعدادات السرعة (ZRAM)
          echo "ALGO=lz4" >> /etc/default/zramswap
          echo "PERCENT=60" >> /etc/default/zramswap
          
          apt-get autoremove -y
          apt-get clean
          EOF

          # الفك الإجباري الآمن لمنع mksquashfs من التهنيج (سبب شائع جداً لـ Exit Code 1)
          sudo umount -lf edit/dev
          sudo umount -lf edit/run
          sudo umount -lf edit/proc
          sudo umount -lf edit/sys
          sudo rm -f edit/etc/resolv.conf

      - name: 📦 6. التغليف والضغط النهائي
        run: |
          SQUASH_FILE=$(find extract-cd -type f -iname "filesystem.squashfs" | head -n 1)
          sudo rm -f "$SQUASH_FILE"
          
          # ضغط قوي لتقليل حجم الـ ISO النهائي
          sudo mksquashfs edit "$SQUASH_FILE" -comp zstd -b 1M -noappend
          
          mkdir -p output
          sudo xorriso -as mkisofs -r -V "HP_G62_OS" -o output/HP-G62-System.iso extract-cd/

      - name: 📤 7. رفع الـ ISO للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: HP-G62-Ultimate-Edition
          path: output/*.iso
