name: Ubuntu-Professional-G62-Remaster
on: workflow_dispatch

jobs:
  ultimate-build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Execute Project Scripts (Step-by-Step)
        run: |
          chmod +x scripts/*.sh
          sudo ./scripts/01_env_setup.sh
          sudo ./scripts/02_iso_fetcher.sh
          sudo ./scripts/03_iso_extractor.sh
          sudo ./scripts/04_squashfs_unpacker.sh
          sudo ./scripts/05_chroot_preparer.sh
          sudo ./scripts/06_system_injector.sh
          sudo ./scripts/07_app_configurator.sh
          sudo ./scripts/08_chroot_cleaner.sh
          sudo ./scripts/09_system_packer.sh
          sudo ./scripts/10_iso_finalizer.sh

      - name: 📤 Final Deployment
        uses: actions/upload-artifact@v4
        with:
          name: Ubuntu-HP-G62-Ultimate
          path: final_iso/*.iso
